<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TrainTribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared.css" />
  <style>
    /* My training bar */
    .my-training {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 36px;
    }
    .my-training-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .my-training-label { font-size: 13px; color: var(--muted); margin-right: 4px; }

    /* Section header */
    .matches-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .matches-header h2 { font-size: 20px; font-weight: 800; color: var(--white); }
    .match-count { font-size: 13px; color: var(--muted); }

    /* Match cards grid */
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 18px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }
    .match-card:hover { border-color: rgba(255,77,0,0.3); transform: translateY(-2px); }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: var(--white);
      margin-bottom: 12px; flex-shrink: 0;
    }
    .avatar-hyrox   { background: linear-gradient(135deg, #FF4D00, #FF9060); }
    .avatar-running { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
    .avatar-lifting { background: linear-gradient(135deg, #7C3AED, #A78BFA); }

    .match-name { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 10px; }
    .match-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 16px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      grid-column: 1 / -1;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; color: var(--muted); max-width: 320px; margin: 0 auto; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.04) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="app-nav">
  <div class="app-nav-inner">
    <a href="/" class="nav-logo">
      <div class="logo-icon"><svg width="15" height="19" viewBox="0 0 15 21" fill="white"><path d="M10.5 0L2 12.5H7.5L5 21 14.5 8.5H9z"/></svg></div><span class="brand">Train<span>Tribe</span></span>
    </a>
    <div class="nav-right">
      <a href="/profile.html" class="nav-avatar" id="navAvatar" title="Profile">?</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
    </div>
  </div>
</nav>

<!-- Page -->
<div class="page">

  <!-- Today's session bar -->
  <div class="my-training" id="myTraining">
    <div class="my-training-left">
      <span class="my-training-label">Training today:</span>
      <span id="myDisc" class="chip">—</span>
      <span id="mySize" class="chip chip-group">—</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='/today.html'">Change session</button>
  </div>

  <!-- Matches -->
  <div class="matches-header">
    <h2>Today's matches</h2>
    <span class="match-count" id="matchCount"></span>
  </div>

  <div class="matches-grid" id="matchesGrid">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Connect modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalName"></h3>
    <p>Reach out directly to arrange a session.</p>
    <div class="email-reveal" id="modalEmail"></div>
    <a id="modalMailto" class="btn btn-primary btn-full" href="#">Send Email</a>
    <div style="margin-top:10px;">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('redirect');
  if (!requireOnboarded()) throw new Error('redirect');

  const _n = getName() || '?';
  document.getElementById('navAvatar').textContent = _n.charAt(0).toUpperCase();

  async function loadDashboard() {
    // Check today's session exists
    let todaySession;
    try {
      todaySession = await api('GET', '/session/today');
      if (!todaySession) { window.location.href = '/today.html'; return; }
      renderSessionBar(todaySession);
    } catch (e) {
      window.location.href = '/today.html'; return;
    }

    // Load matches
    const grid = document.getElementById('matchesGrid');
    grid.innerHTML = '<div class="skeleton" style="height:160px;border-radius:14px;"></div>'.repeat(4);

    try {
      const matches = await api('GET', '/matches');
      document.getElementById('matchCount').textContent =
        matches.length === 0 ? 'No matches yet' :
        matches.length === 1 ? '1 athlete found' :
        `${matches.length} athletes found`;

      if (matches.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>No matches yet</h3>
            <p>You're one of the first here. Invite your training friends to sign up — matches will appear as more students join.</p>
          </div>`;
        return;
      }

      grid.innerHTML = matches.map(m => `
        <div class="match-card">
          <div class="avatar avatar-${m.discipline}">${m.name.charAt(0).toUpperCase()}</div>
          <div class="match-name">${escHtml(m.name)}</div>
          <div class="match-chips">
            <span class="chip chip-${m.discipline}">${DISC_ICON[m.discipline]} ${DISC_LABEL[m.discipline]}</span>
            <span class="chip chip-group">👥 ${SIZE_LABEL[m.groupSize]}</span>
            ${m.year ? `<span class="chip" style="background:rgba(255,255,255,0.05);border-color:var(--border);color:var(--muted);">${escHtml(m.year)}</span>` : ''}
          </div>
          <button class="btn btn-primary btn-full btn-sm" onclick="connect(${m.id}, '${escHtml(m.name)}')">Connect</button>
        </div>
      `).join('');
    } catch (e) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Couldn't load matches</h3><p>${escHtml(e.message)}</p></div>`;
    }
  }

  function renderSessionBar(session) {
    const discEl = document.getElementById('myDisc');
    const sizeEl = document.getElementById('mySize');
    if (session.discipline) {
      discEl.textContent = `${DISC_ICON[session.discipline]} ${DISC_LABEL[session.discipline]}`;
      discEl.className = `chip chip-${session.discipline}`;
    }
    if (session.groupSize) {
      sizeEl.textContent = `👥 ${SIZE_LABEL[session.groupSize]}`;
    }
  }

  async function connect(userId, name) {
    try {
      const data = await api('GET', `/connect/${userId}`);
      document.getElementById('modalName').textContent = name;
      document.getElementById('modalEmail').textContent = data.email;
      document.getElementById('modalMailto').href = `mailto:${data.email}?subject=TrainTribe - Training session`;
      document.getElementById('modalOverlay').classList.add('open');
    } catch (e) {
      alert('Could not load contact info. Please try again.');
    }
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  loadDashboard();
</script>
</body>
</html>
