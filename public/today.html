<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Session — TrainTribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .today-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .today-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%; max-width: 520px;
    }

    .date-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.25);
      color: var(--blue-lt);
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      padding: 4px 12px; border-radius: 50px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .today-card h1 {
      font-size: 26px; font-weight: 900; color: var(--white);
      line-height: 1.2; margin-bottom: 8px;
    }
    .today-card .subtitle {
      font-size: 14px; color: var(--muted); margin-bottom: 32px;
    }

    .section-label {
      font-size: 13px; font-weight: 700; color: var(--off-white);
      margin-bottom: 10px; display: block;
    }

    /* Discipline option cards */
    .disc-grid {
      display: grid;
      gap: 10px; margin-bottom: 28px;
    }
    .disc-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; gap: 16px;
      user-select: none;
    }
    .disc-card:hover   { border-color: rgba(14,165,233,0.5); background: rgba(14,165,233,0.07); }
    .disc-card.selected { border-color: var(--blue); background: rgba(14,165,233,0.12); }
    .disc-card .d-icon  { font-size: 26px; flex-shrink: 0; }
    .disc-card .d-label { font-size: 15px; font-weight: 700; color: var(--white); }
    .disc-card .d-dot   {
      width: 18px; height: 18px;
      border: 2px solid var(--border); border-radius: 50%;
      margin-left: auto; flex-shrink: 0;
      transition: all 0.18s;
    }
    .disc-card.selected .d-dot {
      background: var(--blue); border-color: var(--blue);
      box-shadow: 0 0 8px rgba(14,165,233,0.5);
    }

    /* Group size cards */
    .size-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 32px;
    }
    .size-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .size-card:hover    { border-color: rgba(14,165,233,0.5); background: rgba(14,165,233,0.07); }
    .size-card.selected { border-color: var(--blue); background: rgba(14,165,233,0.12); }
    .size-card .s-icon  { font-size: 24px; margin-bottom: 8px; }
    .size-card .s-label { font-size: 13px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .size-card .s-desc  { font-size: 11px; color: var(--muted); }

    .edit-prefs {
      text-align: center; margin-top: 16px;
      font-size: 13px; color: var(--muted);
    }
    .edit-prefs a { color: var(--blue); font-weight: 500; }
    .edit-prefs a:hover { color: var(--blue-lt); }

    /* Loading state */
    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }

    @media (max-width: 480px) {
      .today-card { padding: 28px 18px; }
      .size-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="today-wrap">
  <div class="today-card">
    <a href="/" class="auth-logo" style="margin-bottom: 20px;">
      <div class="logo-icon"><svg width="14" height="18" viewBox="0 0 14 20" fill="white"><path d="M9 0L1 11.5H6.5L4 20 13 8.5H7.5z"/></svg></div>
      Train<span>Tribe</span>
    </a>

    <div class="date-tag" id="dateTag">📅 Today</div>

    <h1>What are you training today?</h1>
    <p class="subtitle">Pick what you want to do and who you want to train with — we'll find your match.</p>

    <div class="error-msg" id="err"></div>

    <div id="formArea" class="loading">Loading your preferences…</div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('redirect');
  if (!requireOnboarded()) throw new Error('redirect');

  // Set today's date label
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateTag').textContent =
    `📅 ${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

  const DISC_INFO = {
    hyrox:   { icon: '🏋️', label: 'HYROX' },
    running: { icon: '🏃', label: 'Running' },
    lifting: { icon: '💪', label: 'Weightlifting' }
  };
  const SIZE_INFO = {
    '1':  { icon: '🤝', label: '1 partner',  desc: 'One-to-one' },
    '3':  { icon: '👥', label: 'Up to 3',    desc: 'Small group' },
    '3+': { icon: '🏟️', label: '3 or more', desc: 'Squad' }
  };

  let selectedDisc = null;
  let selectedSize = null;

  async function loadForm() {
    try {
      const profile = await api('GET', '/profile');
      const discs   = profile.disciplines || [];
      const sizes   = profile.groupSizes  || [];

      if (discs.length === 0 || sizes.length === 0) {
        window.location.href = '/onboarding.html'; return;
      }

      // Build form HTML
      const discCards = discs.map(d => `
        <div class="disc-card" data-val="${d}" onclick="pickDisc('${d}')">
          <div class="d-icon">${DISC_INFO[d].icon}</div>
          <div class="d-label">${DISC_INFO[d].label}</div>
          <div class="d-dot"></div>
        </div>
      `).join('');

      const sizeCards = sizes.map(s => `
        <div class="size-card" data-val="${s}" onclick="pickSize('${s}')">
          <div class="s-icon">${SIZE_INFO[s].icon}</div>
          <div class="s-label">${SIZE_INFO[s].label}</div>
          <div class="s-desc">${SIZE_INFO[s].desc}</div>
        </div>
      `).join('');

      document.getElementById('formArea').innerHTML = `
        <span class="section-label">What are you training today?</span>
        <div class="disc-grid" id="discGrid">${discCards}</div>

        <span class="section-label">How many training partners today?</span>
        <div class="size-grid" id="sizeGrid">${sizeCards}</div>

        <button class="btn btn-primary btn-full" id="submitBtn" onclick="submit()">
          Find Today's Matches →
        </button>
        <p class="edit-prefs">
          Want to change your disciplines? <a href="/onboarding.html">Edit profile</a>
        </p>
      `;

      // Auto-select if only one option
      if (discs.length === 1) pickDisc(discs[0]);
      if (sizes.length === 1) pickSize(sizes[0]);

    } catch (e) {
      document.getElementById('formArea').innerHTML =
        `<p style="color:var(--muted);text-align:center;">Could not load profile. <a href="/onboarding.html" style="color:var(--blue);">Set up profile</a></p>`;
    }
  }

  function pickDisc(val) {
    selectedDisc = val;
    document.querySelectorAll('.disc-card').forEach(c => {
      c.classList.toggle('selected', c.dataset.val === val);
    });
  }

  function pickSize(val) {
    selectedSize = val;
    document.querySelectorAll('.size-card').forEach(c => {
      c.classList.toggle('selected', c.dataset.val === val);
    });
  }

  async function submit() {
    const err = document.getElementById('err');
    err.classList.remove('show');

    if (!selectedDisc) {
      err.textContent = 'Pick what you are training today.';
      err.classList.add('show'); return;
    }
    if (!selectedSize) {
      err.textContent = 'Pick how many partners you want today.';
      err.classList.add('show'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Finding matches…';

    try {
      await api('POST', '/session', { discipline: selectedDisc, groupSize: selectedSize });
      window.location.href = '/dashboard.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Find Today\'s Matches →';
    }
  }

  loadForm();
</script>
</body>
</html>
