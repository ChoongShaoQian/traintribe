<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — TrainTribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared.css" />
</head>
<body class="auth-page">

<div class="auth-card">
  <a href="/" class="auth-logo">
    <div class="logo-icon">⚡</div>
    Train<span>Tribe</span>
  </a>

  <h1>Join TrainTribe</h1>
  <p class="subtitle">Southampton students only.</p>

  <div class="error-msg" id="err"></div>

  <form id="signupForm">
    <div class="form-group">
      <label for="name">Full name</label>
      <input type="text" id="name" placeholder="Your name" required autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="email">University email</label>
      <input type="email" id="email" placeholder="you@soton.ac.uk" required autocomplete="email" />
      <p class="hint">Must end in @soton.ac.uk or @southampton.ac.uk</p>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required autocomplete="new-password" />
    </div>
    <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create Account</button>
  </form>

  <p class="auth-footer">
    Already have an account? <a href="/login.html">Log in</a>
  </p>
</div>

<script src="/app.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard.html';

  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('err');
    const btn = document.getElementById('submitBtn');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const data = await api('POST', '/auth/signup', {
        name:     document.getElementById('name').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });
      setSession(data.token, data.name, false);
      window.location.href = '/onboarding.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
