<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — TrainTribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .profile-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      display: flex; align-items: center; gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--orange), #FF9060);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; color: var(--white);
      flex-shrink: 0;
      box-shadow: 0 6px 24px rgba(255,77,0,0.35);
    }

    .profile-info { flex: 1; }
    .profile-name {
      font-size: 26px; font-weight: 900; color: var(--white);
      margin-bottom: 4px; letter-spacing: -0.3px;
    }
    .profile-email { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
    .profile-year {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 13px; font-weight: 600; color: var(--off-white);
    }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .section-card h3 {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .empty-chips {
      font-size: 14px; color: var(--muted); font-style: italic;
    }

    .action-list {
      display: flex; flex-direction: column; gap: 10px;
    }

    .action-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
      width: 100%;
    }
    .action-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
    .action-btn.danger:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }

    .action-btn-left { display: flex; align-items: center; gap: 12px; }
    .action-icon { font-size: 18px; }
    .action-label { font-size: 15px; font-weight: 600; color: var(--off-white); }
    .action-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .action-arrow { color: var(--muted); font-size: 16px; }
    .action-btn.danger .action-label { color: #FCA5A5; }

    .loading { text-align: center; padding: 60px 0; color: var(--muted); }
  </style>
</head>
<body>

<nav class="app-nav">
  <div class="app-nav-inner">
    <a href="/dashboard.html" class="nav-logo">
      <div class="logo-icon"><svg width="15" height="19" viewBox="0 0 15 21" fill="white"><path d="M10.5 0L2 12.5H7.5L5 21 14.5 8.5H9z"/></svg></div><span class="brand">Train<span>Tribe</span></span>
    </a>
    <div class="nav-right">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
  </div>
</nav>

<div class="page" id="pageContent">
  <div class="loading">Loading profile…</div>
</div>

<script src="/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('redirect');

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s; return d.innerHTML;
  }

  async function loadProfile() {
    try {
      const p = await api('GET', '/profile');
      const initial = (p.name || '?').charAt(0).toUpperCase();

      const discs = (p.disciplines || []).map(d =>
        `<span class="chip ${DISC_CLASS[d]}">${DISC_ICON[d]} ${DISC_LABEL[d]}</span>`
      ).join('');

      const sizes = (p.groupSizes || []).map(s =>
        `<span class="chip chip-group">👥 ${SIZE_LABEL[s]}</span>`
      ).join('');

      document.getElementById('pageContent').innerHTML = `
        <!-- Header -->
        <div class="profile-header">
          <div class="profile-avatar">${escHtml(initial)}</div>
          <div class="profile-info">
            <div class="profile-name">${escHtml(p.name)}</div>
            <div class="profile-email">${escHtml(p.email)}</div>
            ${p.year ? `<span class="profile-year">🎓 ${escHtml(p.year)}</span>` : ''}
          </div>
        </div>

        <!-- Disciplines -->
        <div class="section-card">
          <h3>Disciplines</h3>
          <div class="chip-row">
            ${discs || '<span class="empty-chips">No disciplines set</span>'}
          </div>
        </div>

        <!-- Group sizes -->
        <div class="section-card">
          <h3>Group size preferences</h3>
          <div class="chip-row">
            ${sizes || '<span class="empty-chips">No preferences set</span>'}
          </div>
        </div>

        <!-- Actions -->
        <div class="section-card">
          <h3>Account</h3>
          <div class="action-list">
            <a href="/today.html" class="action-btn">
              <div class="action-btn-left">
                <span class="action-icon">🏋️</span>
                <div>
                  <div class="action-label">Set today's session</div>
                  <div class="action-sub">Change what you're training today</div>
                </div>
              </div>
              <span class="action-arrow">›</span>
            </a>
            <a href="/onboarding.html" class="action-btn">
              <div class="action-btn-left">
                <span class="action-icon">✏️</span>
                <div>
                  <div class="action-label">Edit profile</div>
                  <div class="action-sub">Update disciplines and group size preferences</div>
                </div>
              </div>
              <span class="action-arrow">›</span>
            </a>
            <button class="action-btn danger" onclick="logout()">
              <div class="action-btn-left">
                <span class="action-icon">🚪</span>
                <div>
                  <div class="action-label">Log out</div>
                  <div class="action-sub">Sign out of your account</div>
                </div>
              </div>
              <span class="action-arrow">›</span>
            </button>
          </div>
        </div>
      `;
    } catch (e) {
      document.getElementById('pageContent').innerHTML =
        `<p style="text-align:center;color:var(--muted);">Could not load profile.</p>`;
    }
  }

  loadProfile();
</script>
</body>
</html>
